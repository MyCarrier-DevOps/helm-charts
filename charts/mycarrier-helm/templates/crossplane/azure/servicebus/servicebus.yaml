{{- if and .Values.infrastructure.azure.servicebus (not (hasPrefix "feature" .Values.environment.name)) }}
{{- $root := . -}}
{{- $cachedLabels := include "helm.labels.standard" $root | fromYaml -}}
{{- $defaults := include "helm.crossplane.defaults" (dict "root" $root) | fromJson -}}
{{- range $sbIndex, $sbInstance := $root.Values.infrastructure.azure.servicebus }}
{{- $sbName := $sbInstance.name | default (include "helm.azure.servicebus.name" (dict "root" $root)) -}}
{{- $sbNamespace := include "helm.crossplane.namespace" (dict "namespace" $sbInstance.namespace "root" $root) -}}
{{- $sbProviderConfigRef := $sbInstance.providerConfigRef | default $defaults.providerConfigRef -}}
{{- $sbLocation := $sbInstance.location | default $defaults.location | required "Service Bus location is required (set per-resource or infrastructure.azure.defaults.location)" -}}
{{- if $sbInstance.managementPolicies }}
{{- if or (has "Delete" $sbInstance.managementPolicies) (has "*" $sbInstance.managementPolicies) }}
{{- fail (printf "Delete management policy is not allowed for Service Bus namespace '%s'. To protect infrastructure, use [\"Create\", \"Update\", \"LateInitialize\", \"Observe\"] instead of [\"*\"] (wildcard) or explicit \"Delete\"." $sbName) }}
{{- end }}
{{- end }}

---
apiVersion: servicebus.azure.upbound.io/v1beta1
kind: ServiceBusNamespace
metadata:
  name: {{ include "helm.crossplane.name" (dict "name" $sbName "environment" $root.Values.environment.name "appStack" $root.Values.global.appStack) }}
  namespace: {{ $sbNamespace }}
  labels:
    {{- toYaml $cachedLabels | nindent 4 }}
    servicebus.mycarrier.io/namespace: {{ $sbName }}
  annotations:
    crossplane.io/external-name: {{ $sbName }}
  {{- if $sbInstance.annotations }}
    {{- toYaml (omit $sbInstance.annotations "crossplane.io/external-name") | nindent 4 }}
  {{- end }}
spec:
  providerConfigRef:
    name: {{ $sbProviderConfigRef }}
  {{- include "helm.crossplane.managementPolicies" (dict "policies" $sbInstance.managementPolicies) | nindent 2 }}
  forProvider:
    location: {{ $sbLocation }}
    sku: {{ $sbInstance.sku | default "Standard" }}
    {{- if $sbInstance.resourceGroupName }}
    resourceGroupName: {{ $sbInstance.resourceGroupName }}
    {{- else if $sbInstance.resourceGroupNameRef }}
    resourceGroupNameRef:
      {{- toYaml $sbInstance.resourceGroupNameRef | nindent 6 }}
    {{- else if $sbInstance.resourceGroupNameSelector }}
    resourceGroupNameSelector:
      {{- toYaml $sbInstance.resourceGroupNameSelector | nindent 6 }}
    {{- else }}
    resourceGroupName: {{ include "helm.azure.resourceGroup.defaultName" (dict "root" $root) }}
    {{- end }}
    {{- if $sbInstance.capacity }}
    capacity: {{ $sbInstance.capacity }}
    {{- end }}
    {{- if $sbInstance.tags }}
    tags:
      {{- toYaml $sbInstance.tags | nindent 6 }}
    {{- end }}
{{- if not $sbInstance.topics }}
{{- fail "At least one topic with subscriptions is required when defining a Service Bus" }}
{{- end }}
{{- range $topicIndex, $topic := $sbInstance.topics }}
{{- $topicFullname := include "helm.azure.servicebus.topic.fullname" (dict "namespace" $sbName "topic" $topic.name "environment" $root.Values.environment.name "appStack" $root.Values.global.appStack) -}}
{{- if $topic.managementPolicies }}
{{- if or (has "Delete" $topic.managementPolicies) (has "*" $topic.managementPolicies) }}
{{- fail (printf "Delete management policy is not allowed for Service Bus topic '%s/%s'. To protect infrastructure, use [\"Create\", \"Update\", \"LateInitialize\", \"Observe\"] instead of [\"*\"] (wildcard) or explicit \"Delete\"." $sbName $topic.name) }}
{{- end }}
{{- end }}

---
apiVersion: servicebus.azure.upbound.io/v1beta1
kind: Topic
metadata:
  name: {{ $topicFullname }}
  namespace: {{ $sbNamespace }}
  labels:
    {{- toYaml $cachedLabels | nindent 4 }}
    servicebus.mycarrier.io/namespace: {{ $sbName }}
    servicebus.mycarrier.io/topic: {{ $topicFullname }}
  annotations:
    crossplane.io/external-name: {{ $topic.name }}
  {{- if $topic.annotations }}
    {{- toYaml (omit $topic.annotations "crossplane.io/external-name") | nindent 4 }}
  {{- end }}
spec:
  providerConfigRef:
    name: {{ $sbProviderConfigRef }}
  {{- include "helm.crossplane.managementPolicies" (dict "policies" $topic.managementPolicies) | nindent 2 }}
  forProvider:
    {{- if $topic.namespaceId }}
    namespaceId: {{ $topic.namespaceId }}
    {{- else if $topic.namespaceIdRef }}
    namespaceIdRef:
      {{- toYaml $topic.namespaceIdRef | nindent 6 }}
    {{- else }}
    namespaceIdSelector:
      matchLabels:
        {{- toYaml $cachedLabels | nindent 8 }}
        servicebus.mycarrier.io/namespace: {{ $sbName }}
    {{- end }}
    {{- if $topic.maxSizeInMegabytes }}
    maxSizeInMegabytes: {{ $topic.maxSizeInMegabytes }}
    {{- end }}
    {{- if hasKey $topic "requiresDuplicateDetection" }}
    requiresDuplicateDetection: {{ $topic.requiresDuplicateDetection }}
    {{- end }}
    {{- if $topic.defaultMessageTtl }}
    defaultMessageTtl: {{ $topic.defaultMessageTtl }}
    {{- end }}
    {{- if $topic.duplicateDetectionHistoryTimeWindow }}
    duplicateDetectionHistoryTimeWindow: {{ $topic.duplicateDetectionHistoryTimeWindow }}
    {{- end }}
    {{- if hasKey $topic "batchedOperationsEnabled" }}
    batchedOperationsEnabled: {{ $topic.batchedOperationsEnabled }}
    {{- end }}
    {{- if hasKey $topic "expressEnabled" }}
    expressEnabled: {{ $topic.expressEnabled }}
    {{- end }}
    {{- if hasKey $topic "partitioningEnabled" }}
    partitioningEnabled: {{ $topic.partitioningEnabled }}
    {{- end }}
    {{- if hasKey $topic "supportOrdering" }}
    supportOrdering: {{ $topic.supportOrdering }}
    {{- end }}
    {{- if $topic.autoDeleteOnIdle }}
    autoDeleteOnIdle: {{ $topic.autoDeleteOnIdle }}
    {{- end }}
{{- range $subIndex, $subscription := $topic.subscriptions }}
{{- $subFullname := include "helm.azure.servicebus.subscription.fullname" (dict "namespace" $sbName "topic" $topic.name "subscription" $subscription.name "environment" $root.Values.environment.name "appStack" $root.Values.global.appStack) -}}
{{- if $subscription.managementPolicies }}
{{- if or (has "Delete" $subscription.managementPolicies) (has "*" $subscription.managementPolicies) }}
{{- fail (printf "Delete management policy is not allowed for Service Bus subscription '%s/%s/%s'. To protect infrastructure, use [\"Create\", \"Update\", \"LateInitialize\", \"Observe\"] instead of [\"*\"] (wildcard) or explicit \"Delete\"." $sbName $topic.name $subscription.name) }}
{{- end }}
{{- end }}

---
apiVersion: servicebus.azure.upbound.io/v1beta1
kind: Subscription
metadata:
  name: {{ $subFullname }}
  namespace: {{ $sbNamespace }}
  labels:
    {{- toYaml $cachedLabels | nindent 4 }}
    servicebus.mycarrier.io/namespace: {{ $sbName }}
    servicebus.mycarrier.io/topic: {{ $topicFullname }}
    servicebus.mycarrier.io/subscription: {{ $subFullname }}
  annotations:
    crossplane.io/external-name: {{ $subscription.name }}
  {{- if $subscription.annotations }}
    {{- toYaml (omit $subscription.annotations "crossplane.io/external-name") | nindent 4 }}
  {{- end }}
spec:
  providerConfigRef:
    name: {{ $sbProviderConfigRef }}
  {{- include "helm.crossplane.managementPolicies" (dict "policies" $subscription.managementPolicies) | nindent 2 }}
  forProvider:
    {{- if $subscription.topicId }}
    topicId: {{ $subscription.topicId }}
    {{- else if $subscription.topicIdRef }}
    topicIdRef:
      {{- toYaml $subscription.topicIdRef | nindent 6 }}
    {{- else }}
    topicIdSelector:
      matchLabels:
        {{- toYaml $cachedLabels | nindent 8 }}
        servicebus.mycarrier.io/namespace: {{ $sbName }}
        servicebus.mycarrier.io/topic: {{ $topicFullname }}
    {{- end }}
    maxDeliveryCount: {{ $subscription.maxDeliveryCount | default 10 }}
    {{- if $subscription.lockDuration }}
    lockDuration: {{ $subscription.lockDuration }}
    {{- end }}
    {{- if hasKey $subscription "requiresSession" }}
    requiresSession: {{ $subscription.requiresSession }}
    {{- end }}
    {{- if $subscription.defaultMessageTtl }}
    defaultMessageTtl: {{ $subscription.defaultMessageTtl }}
    {{- end }}
    {{- if hasKey $subscription "deadLetteringOnMessageExpiration" }}
    deadLetteringOnMessageExpiration: {{ $subscription.deadLetteringOnMessageExpiration }}
    {{- end }}
    {{- if hasKey $subscription "deadLetteringOnFilterEvaluationError" }}
    deadLetteringOnFilterEvaluationError: {{ $subscription.deadLetteringOnFilterEvaluationError }}
    {{- end }}
    {{- if hasKey $subscription "batchedOperationsEnabled" }}
    batchedOperationsEnabled: {{ $subscription.batchedOperationsEnabled }}
    {{- end }}
    {{- if $subscription.autoDeleteOnIdle }}
    autoDeleteOnIdle: {{ $subscription.autoDeleteOnIdle }}
    {{- end }}
    {{- if $subscription.forwardTo }}
    forwardTo: {{ $subscription.forwardTo }}
    {{- end }}
    {{- if $subscription.forwardDeadLetteredMessagesTo }}
    forwardDeadLetteredMessagesTo: {{ $subscription.forwardDeadLetteredMessagesTo }}
    {{- end }}
{{- if $subscription.rules }}
{{- range $ruleIndex, $rule := $subscription.rules }}
{{- if $rule.managementPolicies }}
{{- if or (has "Delete" $rule.managementPolicies) (has "*" $rule.managementPolicies) }}
{{- fail (printf "Delete management policy is not allowed for Service Bus subscription rule '%s/%s/%s/%s'. To protect infrastructure, use [\"Create\", \"Update\", \"LateInitialize\", \"Observe\"] instead of [\"*\"] (wildcard) or explicit \"Delete\"." $sbName $topic.name $subscription.name $rule.name) }}
{{- end }}
{{- end }}

---
apiVersion: servicebus.azure.upbound.io/v1beta2
kind: SubscriptionRule
metadata:
  name: {{ include "helm.azure.servicebus.rule.fullname" (dict "namespace" $sbName "topic" $topic.name "subscription" $subscription.name "rule" $rule.name "environment" $root.Values.environment.name "appStack" $root.Values.global.appStack) }}
  namespace: {{ $sbNamespace }}
  labels:
    {{- toYaml $cachedLabels | nindent 4 }}
    servicebus.mycarrier.io/namespace: {{ $sbName }}
    servicebus.mycarrier.io/topic: {{ $topicFullname }}
    servicebus.mycarrier.io/subscription: {{ $subFullname }}
  annotations:
    crossplane.io/external-name: {{ $rule.name }}
  {{- if $rule.annotations }}
    {{- toYaml (omit $rule.annotations "crossplane.io/external-name") | nindent 4 }}
  {{- end }}
spec:
  providerConfigRef:
    name: {{ $sbProviderConfigRef }}
  {{- include "helm.crossplane.managementPolicies" (dict "policies" $rule.managementPolicies) | nindent 2 }}
  forProvider:
    filterType: {{ $rule.filterType | required "Rule filterType is required" }}
    {{- if $rule.subscriptionId }}
    subscriptionId: {{ $rule.subscriptionId }}
    {{- else if $rule.subscriptionIdRef }}
    subscriptionIdRef:
      {{- toYaml $rule.subscriptionIdRef | nindent 6 }}
    {{- else }}
    subscriptionIdSelector:
      matchLabels:
        {{- toYaml $cachedLabels | nindent 8 }}
        servicebus.mycarrier.io/namespace: {{ $sbName }}
        servicebus.mycarrier.io/topic: {{ $topicFullname }}
        servicebus.mycarrier.io/subscription: {{ $subFullname }}
    {{- end }}
    {{- if $rule.sqlFilter }}
    sqlFilter: {{ $rule.sqlFilter | quote }}
    {{- end }}
    {{- if $rule.correlationFilter }}
    correlationFilter:
      {{- toYaml $rule.correlationFilter | nindent 6 }}
    {{- end }}
    {{- if $rule.action }}
    action: {{ $rule.action | quote }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
