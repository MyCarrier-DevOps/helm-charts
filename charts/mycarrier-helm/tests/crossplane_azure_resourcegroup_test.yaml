suite: Crossplane Azure Resource Group Tests
templates:
  - crossplane/azure/resourcegroup/resourcegroup.yaml
tests:
  # Test 1: Basic Resource Group creation
  - it: should create resource group with minimal configuration
    set:
      global.appStack: testapp
      global.language: nodejs
      environment.name: dev
      applications.test-app-api.deploymentType: deployment
      applications.test-app-api.image.registry: "test.io"
      applications.test-app-api.image.repository: "test/app"
      applications.test-app-api.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-test-dev"
              location: "East US"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ResourceGroup
      - equal:
          path: apiVersion
          value: azure.upbound.io/v1beta1
      - equal:
          path: metadata.name
          value: "dev-testapp-rg-test-dev"
      - equal:
          path: metadata.namespace
          value: dev
      - equal:
          path: spec.forProvider.location
          value: "East US"
      - equal:
          path: spec.managementPolicies[0]
          value: "Observe"

  # Test 2: Resource Group with tags
  - it: should create resource group with tags
    set:
      global.appStack: tagtest
      global.language: python
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-tagged"
              location: "West US"
              tags:
                environment: "dev"
                purpose: "testing"
                team: "platform"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.forProvider.tags.environment
          value: "dev"
      - equal:
          path: spec.forProvider.tags.purpose
          value: "testing"
      - equal:
          path: spec.forProvider.tags.team
          value: "platform"

  # Test 3: Resource Group with Observe management policy
  - it: should create resource group with Observe management policy for import
    set:
      global.appStack: importtest
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-existing"
              location: "Central US"
              managementPolicies:
                - "Observe"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.managementPolicies[0]
          value: "Observe"

  # Test 4: Resource Group with managedBy field
  - it: should create resource group with managedBy field
    set:
      global.appStack: managedtest
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-managed"
              location: "North Europe"
              managedBy: "/subscriptions/12345/resourceGroups/parent-rg"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.forProvider.managedBy
          value: "/subscriptions/12345/resourceGroups/parent-rg"

  # Test 5: Multiple Resource Groups
  - it: should create multiple resource groups
    set:
      global.appStack: multitest
      global.language: nodejs
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-app-dev"
              location: "East US"
            - name: "rg-data-dev"
              location: "East US 2"
            - name: "rg-network-dev"
              location: "West US"
    asserts:
      - hasDocuments:
          count: 3
      - isKind:
          of: ResourceGroup
        documentIndex: 0
      - equal:
          path: metadata.name
          value: "dev-multitest-rg-app-dev"
        documentIndex: 0
      - isKind:
          of: ResourceGroup
        documentIndex: 1
      - equal:
          path: metadata.name
          value: "dev-multitest-rg-data-dev"
        documentIndex: 1
      - isKind:
          of: ResourceGroup
        documentIndex: 2
      - equal:
          path: metadata.name
          value: "dev-multitest-rg-network-dev"
        documentIndex: 2

  # Test 6: Resource Group with custom namespace
  - it: should create resource group in custom kubernetes namespace
    set:
      global.appStack: nstest
      global.language: python
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-custom"
              location: "UK South"
              namespace: "custom-k8s-namespace"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.namespace
          value: "custom-k8s-namespace"

  # Test 7: Resource Group with annotations
  - it: should create resource group with custom annotations
    set:
      global.appStack: annotest
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-annotated"
              location: "Japan East"
              annotations:
                custom.annotation/key: "custom-value"
                another.annotation: "another-value"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.annotations["custom.annotation/key"]
          value: "custom-value"
      - equal:
          path: metadata.annotations["another.annotation"]
          value: "another-value"

  # Test 8: No resource groups configured
  - it: should not create any resources when resource groups are not configured
    set:
      global.appStack: norgtest
      global.language: nodejs
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
    asserts:
      - hasDocuments:
          count: 0

  # Test 9: Resource Group with standard labels
  - it: should include standard helm labels
    set:
      global.appStack: labeltest
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-labels"
              location: "Australia East"
    asserts:
      - hasDocuments:
          count: 1
      - exists:
          path: metadata.labels
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]

  # Test 10: providerConfigRef defaults to "default"
  - it: should set providerConfigRef to default
    set:
      global.appStack: provtest
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-prov-test"
              location: "East US"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.providerConfigRef.name
          value: "default"

  # Test 11: Custom providerConfigRef
  - it: should use custom providerConfigRef when specified
    set:
      global.appStack: custprov
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-custom-prov"
              location: "West US"
              providerConfigRef: "my-custom-provider"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.providerConfigRef.name
          value: "my-custom-provider"

  # Test 12: Global defaults for providerConfigRef and location
  - it: should use global defaults for providerConfigRef and location
    set:
      global.appStack: gdeftest
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          defaults:
            providerConfigRef: "global-provider"
            location: "West Europe"
          resourceGroup:
            - name: "rg-global-def"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.providerConfigRef.name
          value: "global-provider"
      - equal:
          path: spec.forProvider.location
          value: "West Europe"

  # Test 13: Per-resource values override global defaults
  - it: should override global defaults with per-resource values
    set:
      global.appStack: overtest
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          defaults:
            providerConfigRef: "global-provider"
            location: "West Europe"
          resourceGroup:
            - name: "rg-override"
              location: "East US"
              providerConfigRef: "specific-provider"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.providerConfigRef.name
          value: "specific-provider"
      - equal:
          path: spec.forProvider.location
          value: "East US"

  # Test 14: Default resource group name (inf-{metaEnv})
  - it: should default resource group name to inf-dev for dev environment
    set:
      global.appStack: defrgname
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - location: "East US"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: "dev-defrgname-inf-dev"
      - equal:
          path: metadata.annotations["crossplane.io/external-name"]
          value: "inf-dev"

  # Test 15: Feature environments should not create any resources
  - it: should not create any resources for feature environments
    set:
      global.appStack: featrg
      global.language: csharp
      environment.name: feature99
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - location: "East US"
    asserts:
      - hasDocuments:
          count: 0

  # Test 16: Default resource group name for preprod
  - it: should default resource group name to inf-preprod for preprod
    set:
      global.appStack: preprg
      global.language: csharp
      environment.name: preprod
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - location: "East US"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: "preprod-preprg-inf-preprod"

  # Test 17: Wildcard (*) managementPolicies should be blocked (schema rejects before template)
  - it: should fail when wildcard managementPolicies is used
    set:
      global.appStack: wildcard
      global.language: csharp
      environment.name: dev
      applications.test-app.deploymentType: deployment
      applications.test-app.image.registry: "test.io"
      applications.test-app.image.repository: "test/app"
      applications.test-app.image.tag: "1.0.0"
      infrastructure:
        azure:
          resourceGroup:
            - name: "rg-wildcard"
              location: "East US"
              managementPolicies:
                - "*"
    asserts:
      - failedTemplate: {}
