suite: KEDA ScaledObject template tests
templates:
  - keda-scaledobject.yaml
tests:
  - it: should not create ScaledObject when keda is not enabled
    set:
      environment.name: "prod"
      applications.test-app-api.deploymentType: deployment
      applications.test-app-api.isFrontend: false
      applications.test-app-api.image.registry: "myregistry.example.com"
      applications.test-app-api.image.repository: "mycarrier/test-app-api"
      applications.test-app-api.image.tag: "1.0.0"
      applications.test-app-api.ports.http: 8080
    asserts:
      - hasDocuments:
          count: 0

  - it: should create only a ScaledObject (no TriggerAuthentication)
    set:
      environment.name: "prod"
      applications.test-app-api.deploymentType: deployment
      applications.test-app-api.isFrontend: false
      applications.test-app-api.image.registry: "myregistry.example.com"
      applications.test-app-api.image.repository: "mycarrier/test-app-api"
      applications.test-app-api.image.tag: "1.0.0"
      applications.test-app-api.ports.http: 8080
      applications.test-app-api.keda.enabled: true
      applications.test-app-api.keda.type: "topic"
      applications.test-app-api.keda.topicName: "my-topic"
      applications.test-app-api.keda.subscriptionName: "my-subscription"
      applications.test-app-api.keda.clusterAuthRef: "servicebus-connectionstring-prod"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ScaledObject
        documentIndex: 0

  - it: should configure ScaledObject with topic trigger and defaults
    set:
      environment.name: "prod"
      applications.test-app-api.deploymentType: deployment
      applications.test-app-api.isFrontend: false
      applications.test-app-api.image.registry: "myregistry.example.com"
      applications.test-app-api.image.repository: "mycarrier/test-app-api"
      applications.test-app-api.image.tag: "1.0.0"
      applications.test-app-api.ports.http: 8080
      applications.test-app-api.keda.enabled: true
      applications.test-app-api.keda.type: "topic"
      applications.test-app-api.keda.topicName: "my-topic"
      applications.test-app-api.keda.subscriptionName: "my-subscription"
      applications.test-app-api.keda.clusterAuthRef: "servicebus-connectionstring-prod"
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: app-test-app-api
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: app-test-app-api
      - equal:
          path: spec.pollingInterval
          value: 30
      - equal:
          path: spec.cooldownPeriod
          value: 300
      - equal:
          path: spec.minReplicaCount
          value: 2
      - equal:
          path: spec.maxReplicaCount
          value: 50
      - equal:
          path: spec.triggers[0].type
          value: azure-servicebus
      - equal:
          path: spec.triggers[0].metadata.topicName
          value: "my-topic"
      - equal:
          path: spec.triggers[0].metadata.subscriptionName
          value: "my-subscription"
      - equal:
          path: spec.triggers[0].metadata.messageCount
          value: "500"
      - equal:
          path: spec.triggers[0].authenticationRef.name
          value: servicebus-connectionstring-prod
      - equal:
          path: spec.triggers[0].authenticationRef.kind
          value: ClusterTriggerAuthentication

  - it: should configure ScaledObject with queue trigger
    set:
      environment.name: "prod"
      applications.test-app-api.deploymentType: deployment
      applications.test-app-api.isFrontend: false
      applications.test-app-api.image.registry: "myregistry.example.com"
