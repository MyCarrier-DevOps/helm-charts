      applications.test-app-api.keda.clusterAuthRef: "servicebus-connectionstring-prod"
      applications.test-app-api.keda.advanced:
        horizontalPodAutoscalerConfig:
          behavior:
            scaleDown:
              stabilizationWindowSeconds: 300
              policies:
                - type: Percent
                  value: 25
                  periodSeconds: 60
    documentIndex: 0
    asserts:
      - equal:
          path: spec.advanced.horizontalPodAutoscalerConfig.behavior.scaleDown.stabilizationWindowSeconds
          value: 300
      - equal:
          path: spec.advanced.horizontalPodAutoscalerConfig.behavior.scaleDown.policies[0].type
