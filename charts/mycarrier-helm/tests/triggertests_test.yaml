            tag: "1.0.0"
          testtrigger:
            ttlSecondsAfterFinished: "300"
            testdefinitions:
              - name: "apitests"
                containerImage: "alpine/curl"
                containerTag: "latest"
                secretId: "vault:Secret/data/secret#SecretId"
                filters:
                  - "TestCategory=api"
              - name: "uitests"
                containerImage: "cypress/included"
                containerTag: "12.8.1"
                secretId: "vault:Secret/data/ui#SecretId"
                filters:
                  - "TestCategory=ui"
                  - "TestPriority=high"
              - name: "performancetests"
                containerImage: "k6/operator"
                containerTag: "latest"
                secretId: "vault:Secret/data/performance#SecretId"
                filters:
                  - "TestCategory=performance"
    asserts:
      - isKind:
          of: Job
      - hasDocuments:
          count: 1
      - exists:
          path: spec
          
