                  - "TestCategory=whatever"
    asserts:
      - isKind:
          of: Job
      - hasDocuments:
          count: 1
      - exists:
          path: metadata.labels
      - exists:
          path: metadata.annotations
            
  - it: should use testenginehook spec
    set:
      fullnameOverride: app
      namespace: dev-app
