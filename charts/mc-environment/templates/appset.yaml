{{- /*
  Generates one ApplicationSet per defined environment, separated by YAML document markers.
  Each ApplicationSet contains a single list generator element for its environment.
*/ -}}
{{- range $env := .Values.environments }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ $.Values.global.appStack | lower }}-{{ $env.name }}
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
      - list:
          elements:
            - Values:
                isEnvironmentDeploy: true
                global:
                  appStack: {{ $.Values.global.appStack | lower }}
                  gitbranch: {{ $.Values.global.gitbranch }}
                  branchlabel: {{ $.Values.global.branchlabel }}
                  language: {{ $.Values.global.language }}
                  v2migration: {{ $.Values.global.v2migration }}
                  {{- $mergedEnv := deepCopy ($.Values.global.env | default dict) }}
                  {{- if $env.global }}{{- if $env.global.env }}{{- $mergedEnv = mustMergeOverwrite $mergedEnv $env.global.env }}{{- end }}{{- end }}
                  {{- if $mergedEnv }}
                  env:
                    {{- $mergedEnv | toYaml | nindent 20 }}
                  {{- end }}
                  {{ with $.Values.global.dependencies }}
                  dependencies:
                    {{- toYaml . | nindent 20 }}
                  {{ end }}
                environment:
                  name: {{ $env.name }}
                  dependencyenv: {{ $env.dependencyenv | default "" }}
                enableVaultCA: {{ $env.enableVaultCA | default false }}
                disableOtelAutoinstrumentation: {{ $env.disableOtelAutoinstrumentation | default false }}
                tolerations: {{ $env.tolerations | default "[]" }}
                deployment: {{ $env.deployment | default "deployment" }}
                {{ with $env.applications }}applications:
                  {{- toYaml . | nindent 18 }}
                  {{- end }}
                {{ with $env.jobs }}jobs:
                  {{- toYaml . | nindent 18 }}
                  {{- end }}
                {{ with $env.secrets }}secrets:
                  {{- toYaml . | nindent 18 }}
                  {{- end }}
                {{ with $env.infrastructure }}infrastructure:
                  {{- toYaml . | nindent 18 }}
                  {{- end }}
  template:
    metadata:
      name: "{{ $.Values.global.appStack | lower }}-{{`{{`}} .Values.environment.name {{`}}`}}"
      annotations:
        notifications.argoproj.io/subscribe.on-deployed.deploy-reporter: ""
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{`{{`}} .Values.environment.name {{`}}`}}"
      source:
        repoURL: https://charts.mycarrier.dev
        chart: mycarrier-helm
        targetRevision: "{{ $.Values.mycarrierChartVersion | default "3.0.44" }}"
        helm:
          values: |2+
            {{`{{`}} .Values | toYaml {{`}}`}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ApplyOutOfSyncOnly=true
          - Validate=true
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=false
          - ServerSideApply=true
          - Replace=true
          - SkipDryRunOnMissingResource=true

        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 10m
{{- end }}
