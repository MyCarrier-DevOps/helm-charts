# Validates ApplicationSet rendering for mc-environment wrapper
suite: application set
templates:
  - templates/appset.yaml
tests:
  - it: renders one application set per environment
    values:
      - fixtures/basic-environments.yaml
    asserts:
      - hasDocuments:
          count: 2
      - containsDocument:
          kind: ApplicationSet
          apiVersion: argoproj.io/v1alpha1
          name: carriers-dev
          namespace: argocd
          any: true
      - containsDocument:
          kind: ApplicationSet
          apiVersion: argoproj.io/v1alpha1
          name: carriers-prod
          namespace: argocd
          any: true
  - it: forwards dev environment configuration into list elements
    values:
      - fixtures/basic-environments.yaml
    documentSelector:
      path: metadata.name
      value: carriers-dev
    asserts:
      - equal:
          path: spec.goTemplateOptions[0]
          value: missingkey=error
      - lengthEqual:
          path: spec.generators[0].list.elements
          count: 1
      - equal:
          path: spec.generators[0].list.elements[0].Values.environment.name
          value: dev
      - equal:
          path: spec.generators[0].list.elements[0].Values.deployment
          value: rollout
      - equal:
          path: spec.generators[0].list.elements[0].Values.global.dependencies.redis
          value: true
      - equal:
          path: spec.generators[0].list.elements[0].Values.global.env.LOG_LEVEL
          value: info
      - equal:
          path: spec.generators[0].list.elements[0].Values.global.correlationId
          value: test-corr-id-123
      - equal:
          path: spec.generators[0].list.elements[0].Values.global.commitDeployed
          value: abc1234
      - equal:
          path: spec.generators[0].list.elements[0].Values.infrastructure.azure.storage.accounts[0].newStorageAccount.name
          value: shipmentsdata
      - equal:
          path: spec.generators[0].list.elements[0].Values.infrastructure.azure.storage.accounts[0].containers[0].metadata.retention
          value: "30days"
      - equal:
          path: spec.generators[0].list.elements[0].Values.enableVaultCA
          value: true
  - it: applies defaults for omitted environment settings
    values:
      - fixtures/basic-environments.yaml
    documentSelector:
      path: metadata.name
      value: carriers-prod
    asserts:
      - lengthEqual:
          path: spec.generators[0].list.elements
          count: 1
      - equal:
          path: spec.generators[0].list.elements[0].Values.environment.name
          value: prod
      - equal:
          path: spec.generators[0].list.elements[0].Values.enableVaultCA
          value: false
      - equal:
          path: spec.generators[0].list.elements[0].Values.disableOtelAutoinstrumentation
          value: false
      - equal:
          path: spec.generators[0].list.elements[0].Values.deployment
          value: deployment
      - equal:
          path: spec.generators[0].list.elements[0].Values.tolerations
          value: []
  - it: forwards empty correlationId and commitDeployed when not set
    set:
      global.appStack: carriers
      global.correlationId: ""
      global.commitDeployed: ""
      environments:
        - name: dev
    documentSelector:
      path: metadata.name
      value: carriers-dev
    asserts:
      - equal:
          path: spec.generators[0].list.elements[0].Values.global.correlationId
          value: ""
      - equal:
          path: spec.generators[0].list.elements[0].Values.global.commitDeployed
          value: ""
  - it: configures template with chart source and sync policies
    values:
      - fixtures/basic-environments.yaml
    documentSelector:
      path: metadata.name
      value: carriers-dev
    asserts:
      - equal:
          path: spec.template.metadata.name
          value: "carriers-{{ .Values.environment.name }}"
      - equal:
          path: spec.template.spec.destination.namespace
          value: "{{ .Values.environment.name }}"
      - equal:
          path: spec.template.spec.source.chart
          value: mycarrier-helm
      - equal:
          path: spec.template.spec.source.targetRevision
          value: "2.5.100"
      - equal:
          path: spec.template.spec.syncPolicy.syncOptions[0]
          value: ApplyOutOfSyncOnly=true
      - equal:
          path: spec.template.spec.syncPolicy.syncOptions[2]
          value: CreateNamespace=true
      - equal:
          path: spec.template.spec.syncPolicy.syncOptions[6]
          value: Replace=true
